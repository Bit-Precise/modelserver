services:
  postgres:
    image: postgres:18-alpine
    env_file: .env.postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-hydra-db.sql:/docker-entrypoint-initdb.d/init-hydra-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelserver"]
      interval: 5s
      timeout: 5s
      retries: 5

  hydra:
    image: oryd/hydra:v26.2.0
    command: serve all --dev
    env_file: .env.hydra
    expose:
      - "4444"
      - "4445"
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  hydra-migrate:
    image: oryd/hydra:v26.2.0
    command: migrate sql up -e --yes
    env_file: .env.hydra
    depends_on:
      postgres:
        condition: service_healthy

  modelserver:
    build: .
    env_file: .env.modelserver
    expose:
      - "8080"
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
      hydra:
        condition: service_started

  # Payserver source lives in its own repo (extracted from this monorepo
  # in commit <this-PR-merge-sha>; see docs/payserver-extracted.md). The
  # service still runs in this compose stack — it pulls a prebuilt image
  # from the registry rather than building from a local subdirectory.
  # Set PAYSERVER_IMAGE in your shell or .env to pin a specific tag
  # (e.g. ghcr.io/yourorg/payserver:v1.2.3); defaults to :latest from
  # the placeholder registry — update the default once the new repo is
  # publishing images.
  payserver:
    image: ${PAYSERVER_IMAGE:-ghcr.io/PLACEHOLDER-ORG/payserver:latest}
    env_file: .env.payserver
    expose:
      - "8090"
    depends_on:
      postgres:
        condition: service_healthy
      modelserver:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://codeapi.cs.ac.cn}
    env_file: .env.gateway
    ports:
      - "80:80"
    depends_on:
      - modelserver
      - payserver
      - hydra

volumes:
  pgdata:
